
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroHorta Os - IoT Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <h2>🌱 AgroHorta<span>OS</span></h2>

            <nav class="menu">
                <button class="menu-item active">📊 Visão Geral</button>
                <button id="btn-regar" class="btn-action">⚡ Acionar Irrigação</button>

            <div class="system-status">
                <span class="ping-icon"></span>
                <p>Sensor Node: <span id="node-status">Online</span></p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="title-section">
                    <h1>Painel de Controle</h1>
                    <p id="data-atual">Telemetria em tempo real</p>
                </div>
                <button id="btn-refresh" class="btn-refresh">🔄 Atualizar Sensores</button>
            </header>

                    <span class="icon">💧</span>
                    <div class="metric-data">
                        <h3>Umidade do Solo</h3>
                        <p id="val-umidade">--</p>
                    </div>
                </div>
                <div class="metric-card">
                    <span class="icon">☀️</span>
                    <div class="metric-data">
                        <h3>Temperatura</h3>
                        <p id="val-temp">--</p>
                    </div>
                </div>
                <div class="metric-card">
                    <span class="icon">⚙️</span>
                    <div class="metric-data">
                        <h3>Status da Bomba</h3>
                        <p id="val-bomba" class="status-off">Inativa</p>
                    </div>
                </div>
            </section>
